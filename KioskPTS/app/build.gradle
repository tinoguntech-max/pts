plugins {
    id 'com.android.application'
}

android {
    namespace 'com.smkn1kras.kioskpts'
    compileSdk 34

    defaultConfig {
        applicationId "com.smkn1kras.kioskpts"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
